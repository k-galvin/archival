<div class="timeline-container fade-in">
  <!-- Temporal Header -->
  <header class="timeline-header">
    <div class="header-left">
      <span class="archival-overline text-accent">Temporal Scale</span>
      <h2 class="view-title">chronology</h2>
    </div>
  </header>

  <!-- Vertical Timeline -->
  <div class="vertical-timeline">
    @for (group of groupedByYear(); track group.year) {
      <div class="timeline-year-section" [style.marginTop.rem]="calculateGap(group.gap)">
        <div class="year-marker">
          <span class="year-text">{{ group.year }}</span>
        </div>
        <div class="item-grid">
          @for (item of group.items; track item.id) {
            <div class="timeline-item">
              <a
                [routerLink]="['/item', item.id]"
                style="text-decoration: none; color: inherit"
              >
                <div
                  #imageWrapper
                  class="card-img-wrapper image-load-shimmer"
                  [class.is-formatted-cover]="
                    item.image.includes('books.google.com') ||
                    item.image.includes('discogs.com')
                  "
                >
                  <img
                    [src]="item.image"
                    [alt]="item.name"
                    class="card-img"
                    (load)="imageWrapper.classList.add('loaded')"
                    loading="lazy"
                  />
                  <div class="image-overlay"></div>
                </div>
                <div class="card-meta">
                  <p class="card-name">{{ item.name }}</p>
                  <span class="card-year archival-overline text-accent">{{
                    item.year
                  }}</span>
                </div>
              </a>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
