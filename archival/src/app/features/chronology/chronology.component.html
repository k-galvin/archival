<div class="timeline-container fade-in">
  <!-- Temporal Header -->
  <header class="timeline-header">
    <div class="header-left">
      <span class="archival-overline text-accent">Temporal Scale</span>
      <h2 class="view-title">chronology</h2>
    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
      <button
        (click)="zoomOut()"
        [disabled]="zoom() <= 1"
        class="zoom-btn"
        title="Decrease Scale"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
      <span class="zoom-level archival-overline">{{ zoom() * 100 }}%</span>
      <button
        (click)="zoomIn()"
        [disabled]="zoom() >= 4"
        class="zoom-btn"
        title="Increase Scale"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          <line x1="11" y1="8" x2="11" y2="14"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- Interactive Timeline Rail -->
  <div class="timeline-scroll-area custom-scrollbar hide-scrollbar">
    <div class="timeline-rail" [style.width.%]="100 * zoom()">
      <!-- Decade Background Markers -->
      @for (year of decadeMarkers; track year) {
        <div class="rail-marker" [style.left.%]="getTimelinePos(year)">
          <span class="marker-year">{{ year }}</span>
        </div>
      }

      <!-- Item Data Points -->
      @for (group of groupedByYear(); track group.year) {
        <div class="timeline-node" [style.left.%]="getTimelinePos(group.year)">
          <!-- Hover Detail Card -->
          <div class="node-hover-card">
            @for (item of group.items; track item.id) {
              <div class="card-item">
                <div
                  class="card-img-wrapper"
                  [class.is-formatted-cover]="
                    item.image.includes('books.google.com') ||
                    item.image.includes('discogs.com')
                  "
                >
                  <img
                    [src]="item.image"
                    [alt]="item.name"
                    class="card-img"
                  />
                </div>
                <div class="card-meta">
                  <p class="card-name">{{ item.name }}</p>
                  <span class="card-year archival-overline text-accent">{{
                    item.year
                  }}</span>
                </div>
              </div>
            }
          </div>

          <!-- The visible dot on the rail -->
          <div class="node-dot bg-accent">
            @if (group.items.length > 1) {
              <div class="node-stack"></div>
              <span class="item-count">{{ group.items.length }}</span>
            }
          </div>
        </div>
      }

      <!-- Rail Base Line -->
      <div class="rail-baseline"></div>
    </div>
  </div>
</div>
