<div class="auth-container fade-in">
  <div class="auth-box">
    <!-- Header -->
    <header class="auth-header">
      <span class="archival-overline text-accent">Access Protocol</span>
      <h2 class="auth-title">
        {{ isLogin() ? "Archivist Login" : "Register Volume" }}
      </h2>
    </header>

    <!-- Messaging -->
    @if (errorMessage()) {
      <div class="auth-error-box slide-down">
        <span class="error-text">{{ errorMessage() }}</span>
      </div>
    }
    @if (successMessage()) {
      <div class="auth-success-box slide-down">
        <span class="success-text">{{ successMessage() }}</span>
      </div>
    }

    <!-- Form -->
    <form (ngSubmit)="handleSubmit()" class="auth-form">
      @if (!isLogin()) {
        <div class="field-group slide-down">
          <p class="auth-notice">
            Note: An email confirmation will be required to activate your
            account.
          </p>
          <label class="archival-overline" for="name">Identity</label>
          <input
            id="name"
            type="text"
            [(ngModel)]="authData.name"
            name="name"
            placeholder="name / identifier"
            required
            [disabled]="archive.isLoggingIn()"
          />
        </div>
      }

      <div class="field-group">
        <label class="archival-overline" for="email">Credentials</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="authData.email"
          name="email"
          placeholder="email address"
          required
          [disabled]="archive.isLoggingIn()"
        />
        <input
          type="password"
          [(ngModel)]="authData.password"
          name="password"
          placeholder="passcode"
          required
          [disabled]="archive.isLoggingIn()"
        />
      </div>

      <div class="actions">
        <button
          type="submit"
          class="submit-btn bg-accent"
          [disabled]="isSubmitting() || archive.isLoggingIn()"
        >
          {{
            isSubmitting()
              ? "Verifying..."
              : isLogin()
                ? "Authenticate"
                : "Open Record"
          }}
        </button>

        <button
          type="button"
          (click)="toggleMode()"
          class="toggle-link"
          [disabled]="isSubmitting() || archive.isLoggingIn()"
        >
          {{ isLogin() ? "Request new access" : "Existing archivist sign-in" }}
        </button>
      </div>
    </form>

    <footer class="auth-footer">
      <p class="archival-overline">Secure Archival System v1.0.4</p>
    </footer>
  </div>
</div>
