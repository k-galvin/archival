<div class="app-container">
  <!-- Page Loader -->
  <app-page-loader [isLoading]="isLoading"></app-page-loader>

  <!-- Fixed Layout Components -->
  <app-magazine-spine />
  <app-main-nav />

  <!-- Persistent Frame Borders-->
  <div class="frame-border-outer"></div>
  <div class="frame-border-inner"></div>

  <!-- Dynamic Feature Content Swapped by Router -->
  <main class="content-area">
    <router-outlet />
  </main>

  <!-- Persistent Page Footer -->
  <app-main-footer />
</div>
